version: '3.5'

networks:
  main:
    name: MiniTwit

services:
  
  minitwitimage-e:
    image: marieitu/minitwitimage-e
    container_name: minitwit
    networks:
      - main
    ports:
      - '5000:5000'
    environment:
      - DB_CONNECTION=${DB_CONNECTION}
    depends_on:
      - grafana
      - prometheus
  
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - main


  grafana:
    image: grafana/grafana:12.4.1
    ports:
      - "3000:3000"
    networks:
      - main