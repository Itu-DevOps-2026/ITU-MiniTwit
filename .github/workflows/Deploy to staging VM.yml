---
name: Staging Deployment

on:
  pull_request:
    branches: main
  # allow manual triggers for now too
  workflow_dispatch:
    manual: true

# Remember to set the following secrets in your repository's settings:
# https://github.com/your_username/itu-minitwit-ci/settings/secrets/actions
# DOCKER_USERNAME
# DOCKER_PASSWORD
# SSH_USER
# SSH_KEY
# SSH_HOST

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push minitwitimage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile-MiniTwit
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/minitwitimage-e:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwitimage-e:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwitimage-e:webbuildcache,mode=max
          
      - name: Build and push grafanaimage
        uses: docker/build-push-action@v6
        with:
          context: ./grafana
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/grafanaimage-e:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/grafanaimage-e:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/grafanaimage-e:webbuildcache,mode=max
      
      - name: Build and push prometheusimage
        uses: docker/build-push-action@v6
        with:
          context: ./prometheus
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/prometheusimage-e:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/prometheusimage-e:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/prometheusimage-e:webbuildcache,mode=max
          
      - name: Build and push lokiimage
        uses: docker/build-push-action@v6
        with:
          context: ./loki
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lokiimage-e:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lokiimage-e:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lokiimage-e:webbuildcache,mode=max

          
      - name: Build and push alloyimage
        uses: docker/build-push-action@v6
        with:
          context: ./alloy
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/alloyimage-e:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/alloyimage-e:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/alloyimage-e:webbuildcache,mode=max

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Sync files to VM
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            remote_files/ \
            $SSH_USER@$SSH_HOST:/minitwit/
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          
      - name: Run deploy script
        run: |
          ssh -i ~/.ssh/id_rsa $SSH_USER@$SSH_HOST << 'EOF'
            cd ~/app
            chmod +x deploy.sh
            ./deploy.sh
          EOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
