name: Static Analysis
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Docker Linter: Hadolint
    - name: Lint Dockerfiles
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile-MiniTwit # Our dockerfile path

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # C# Formatter: CSharpier
    - name: Restore tools
      run: dotnet tool restore
    - name: Check Formatting
      run: dotnet csharpier check .

    # C# Linter: Roslyn (Strict Linting)
    - name: Restore dependencies
      run: dotnet restore
    - name: Roslyn Static Analysis
      run: dotnet build --no-restore -c Release /p:TreatWarningsAsErrors=true