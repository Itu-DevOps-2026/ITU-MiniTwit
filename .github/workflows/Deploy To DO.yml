---
name: Continuous Deployment

on:
  push:
    # Run workflow every time something is pushed to the main branch
    branches:
      - main
      - master
  # allow manual triggers for now too
  workflow_dispatch:
    manual: true

# Remember to set the following secrets in your repository's settings:
# https://github.com/your_username/itu-minitwit-ci/settings/secrets/actions
# DOCKER_USERNAME
# DOCKER_PASSWORD
# SSH_USER
# SSH_KEY
# SSH_HOST

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push minitwitimage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile-MiniTwit
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/minitwitimage-e:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwitimage-e:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwitimage-e:webbuildcache,mode=max
          
      - name: Build and push grafanaimage
        uses: docker/build-push-action@v6
        with:
          context: ./grafana
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/grafanaimage-e:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/grafanaimage-e:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/grafanaimage-e:webbuildcache,mode=max
      
      - name: Build and push prometheusimage
        uses: docker/build-push-action@v6
        with:
          context: ./prometheus
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/prometheusimage-e:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/prometheusimage-e:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/prometheusimage-e:webbuildcache,mode=max
          
      - name: Build and push lokiimage
        uses: docker/build-push-action@v6
        with:
          context: ./loki
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lokiimage-e:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lokiimage-e:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lokiimage-e:webbuildcache,mode=max
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Sync deployment files to server
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no" \
            docker-compose.yml \
            remote_files/deploy.sh \
            $SSH_USER@$SSH_HOST:/minitwit/
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}


      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST 'bash -s' <<'EOF'
          set -euo pipefail
          # Values are interpolated by Actions (masked in logs) and sent via stdin to the remote shell.
          DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
          DB_CONNECTION="${{ secrets.DB_CONNECTION }}"
          export DOCKER_USERNAME DB_CONNECTION

          # run the deploy script
          bash /minitwit/deploy.sh
          EOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
            
